<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .cartItem {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-radius: 10px;
    }

    img {
      border-radius: 10px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    #buyNow {
      background: green;
      color: white;
      margin-top: 20px;
      padding: 10px 20px;
    }

    #buyNow:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

  <h1>Your Cart</h1>

  <div id="cartContainer"></div>

  <h2 id="totalPrice"></h2>

 
  <button id="buyNow">Buy Now</button>

  <br><br>
  <a href="index.html">⬅ Back to Shop</a>

  <script src="cart.js"></script>
</body>
</html>
